services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    ports:
      - "${WEB_PORT:-3003}:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    environment:
      NODE_ENV: development
    command: sh -c "rm -rf .next && npm install && npm run dev -- -H 0.0.0.0 -p 3000"
